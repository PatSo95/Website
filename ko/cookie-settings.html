<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <script>if(location.hostname==="patso95.github.io"){document.querySelector("base")?.setAttribute("href","/Website/");}</script>
    <title>쿠키 설정 | Danbees Studybees (KO)</title>
    <meta name="description" content="언제든지 쿠키 범주를 변경하세요." />
    <link rel="canonical" href="https://danbeesstudybees.org/ko/cookie-settings.html" />
    <link rel="alternate" hreflang="en" href="https://danbeesstudybees.org/en/cookie-settings.html" />
    <link rel="alternate" hreflang="ko" href="https://danbeesstudybees.org/ko/cookie-settings.html" />
    <link rel="alternate" hreflang="x-default" href="https://danbeesstudybees.org/ko/cookie-settings.html" />
    <meta property="og:title" content="쿠키 설정 | Danbees Studybees" />
    <meta property="og:description" content="쿠키 동의 범주를 직접 관리할 수 있습니다." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://danbeesstudybees.org/ko/cookie-settings.html" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:locale:alternate" content="en_US" />
    <link rel="stylesheet" href="assets/styles.css" />
    <script src="assets/site.js" defer></script>
  </head>
  <body>
    <header>
      <div class="wrap">
        <a href="ko/">Danbees Studybees</a>
        <nav class="switcher" aria-label="언어 전환">
          <a href="en/cookie-settings.html">EN</a>
          <a href="ko/cookie-settings.html" aria-current="page">KO</a>
        </nav>
      </div>
    </header>
    <main>
      <section class="card">
        <h1>쿠키 설정</h1>
        <p>필수 쿠키는 항상 활성화됩니다. 언제든지 선택을 변경할 수 있습니다.</p>
        <form data-cookie-settings-form data-saved-message="쿠키 설정이 저장되었습니다.">
          <fieldset>
            <legend>쿠키 범주</legend>
            <label><input type="checkbox" checked disabled /> 필수(항상 사용)</label>
            <label><input type="checkbox" name="preferences" /> 환경설정</label>
            <label><input type="checkbox" name="analytics" /> 분석</label>
            <label><input type="checkbox" name="marketing" /> 마케팅</label>
          </fieldset>
          <p><button type="submit">설정 저장</button></p>
        </form>
        <p data-settings-status aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
